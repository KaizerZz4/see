# Drop this in the watched repo at: .github/workflows/ci.yml
#
# Purpose: give the §17 battery a CI check that ZYRA can watch and that YOU can
# deliberately break on the injection day ("force a real CI failure").
#
# It is intentionally tiny and dependency-free so the failure is unambiguous:
# the whole point is a red check, not a realistic build.
#
# HOW TO BREAK IT ON INJECTION DAY (choose one, both are one line):
#   * edit tests/test_smoke.py and change `assert add(2, 2) == 4` to `== 5`
#   * or commit a syntax error into app.py
# Push that to main and the check goes red within ~30s.
#
# HOW TO GO GREEN AGAIN: revert that one line and push.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:      # lets you trigger a run by hand from the Actions tab

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run the smoke test
        run: python -m unittest discover -s tests -v
